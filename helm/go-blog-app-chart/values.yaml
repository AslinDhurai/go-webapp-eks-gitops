# Default values for go-blog-app-chart

replicaCount: 1

image: 
  repository: aslindhurai/go-blog-app
  pullPolicy: IfNotPresent
  tag: "v1"

ingress:
  enabled: false
  className: ""
  annotations: {}
   # kubernetes.io/ingress.class: nginx
   # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific